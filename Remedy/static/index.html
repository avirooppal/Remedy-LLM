<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Remedy AI</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #f7f4ef;
                --surface: #ffffff;
                --border: #e2ddd6;
                --text: #2c2820;
                --muted: #8c8278;
                --accent: #5a7a5a;
                --accent-l: #e8f0e8;
                --warn: #8c6a3a;
                --warn-l: #fdf3e7;
                --radius: 14px;
            }

            body {
                font-family: "DM Sans", sans-serif;
                background: var(--bg);
                color: var(--text);
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 48px 16px 80px;
            }

            /* ── Header ── */
            header {
                text-align: center;
                margin-bottom: 44px;
                animation: fadeUp 0.6s ease both;
            }

            .leaf {
                font-size: 2rem;
                display: block;
                margin-bottom: 10px;
                filter: grayscale(20%);
            }

            h1 {
                font-family: "Cormorant Garamond", serif;
                font-weight: 300;
                font-size: clamp(2rem, 5vw, 2.75rem);
                letter-spacing: 0.02em;
                color: var(--text);
                line-height: 1.15;
            }

            h1 em {
                font-style: italic;
                color: var(--accent);
            }

            .subtitle {
                margin-top: 8px;
                font-size: 0.85rem;
                color: var(--muted);
                font-weight: 300;
                letter-spacing: 0.03em;
            }

            /* ── Card ── */
            .card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                width: 100%;
                max-width: 560px;
                padding: 32px;
                animation: fadeUp 0.7s 0.1s ease both;
                box-shadow: 0 2px 24px rgba(0, 0, 0, 0.05);
            }

            label {
                display: block;
                font-size: 0.75rem;
                font-weight: 400;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: var(--muted);
                margin-bottom: 10px;
            }

            textarea {
                width: 100%;
                min-height: 90px;
                resize: vertical;
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 14px 16px;
                font-family: "DM Sans", sans-serif;
                font-size: 0.95rem;
                font-weight: 300;
                color: var(--text);
                background: var(--bg);
                outline: none;
                transition: border-color 0.2s;
                line-height: 1.6;
            }

            textarea::placeholder {
                color: var(--muted);
            }
            textarea:focus {
                border-color: var(--accent);
            }

            /* Quick suggestions */
            .chips {
                display: flex;
                flex-wrap: wrap;
                gap: 7px;
                margin-top: 12px;
            }

            .chip {
                background: none;
                border: 1px solid var(--border);
                border-radius: 20px;
                padding: 5px 13px;
                font-size: 0.78rem;
                font-family: "DM Sans", sans-serif;
                color: var(--muted);
                cursor: pointer;
                transition: all 0.18s;
            }

            .chip:hover {
                border-color: var(--accent);
                color: var(--accent);
                background: var(--accent-l);
            }

            /* Submit button */
            button.submit {
                margin-top: 20px;
                width: 100%;
                padding: 14px;
                background: var(--accent);
                color: #fff;
                border: none;
                border-radius: 10px;
                font-family: "DM Sans", sans-serif;
                font-size: 0.9rem;
                letter-spacing: 0.04em;
                cursor: pointer;
                transition:
                    opacity 0.2s,
                    transform 0.15s;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
            }

            button.submit:hover {
                opacity: 0.88;
            }
            button.submit:active {
                transform: scale(0.98);
            }
            button.submit:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            /* Spinner */
            .spinner {
                width: 16px;
                height: 16px;
                border: 2px solid rgba(255, 255, 255, 0.35);
                border-top-color: #fff;
                border-radius: 50%;
                animation: spin 0.7s linear infinite;
                display: none;
            }
            .loading .spinner {
                display: block;
            }
            .loading .btn-text {
                display: none;
            }

            /* ── Response ── */
            .response-card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                width: 100%;
                max-width: 560px;
                margin-top: 20px;
                overflow: hidden;
                animation: fadeUp 0.4s ease both;
                box-shadow: 0 2px 24px rgba(0, 0, 0, 0.04);
                display: none;
            }

            .response-card.visible {
                display: block;
            }

            .response-header {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 14px 20px;
                border-bottom: 1px solid var(--border);
                font-size: 0.72rem;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: var(--muted);
                background: var(--bg);
            }

            .dot {
                width: 7px;
                height: 7px;
                border-radius: 50%;
                background: var(--accent);
            }

            .response-body {
                padding: 22px 24px;
                font-size: 0.92rem;
                line-height: 1.8;
                font-weight: 300;
                white-space: pre-wrap;
                color: var(--text);
            }

            /* Disclaimer styled separately */
            .disclaimer {
                margin: 14px 24px 20px;
                padding: 11px 14px;
                background: var(--warn-l);
                border-left: 3px solid var(--warn);
                border-radius: 6px;
                font-size: 0.78rem;
                color: var(--warn);
                line-height: 1.5;
            }

            /* ── Error ── */
            .error-card {
                background: #fef2f2;
                border: 1px solid #fecaca;
                border-radius: var(--radius);
                padding: 16px 20px;
                font-size: 0.88rem;
                color: #b91c1c;
                width: 100%;
                max-width: 560px;
                margin-top: 16px;
                display: none;
            }
            .error-card.visible {
                display: block;
            }

            /* ── Footer ── */
            footer {
                margin-top: 52px;
                font-size: 0.73rem;
                color: var(--muted);
                letter-spacing: 0.04em;
                text-align: center;
            }

            /* ── Animations ── */
            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(14px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>
    <body>
        <header>
            <span class="leaf">🌿</span>
            <h1>Natural <em>Remedies</em></h1>
            <p class="subtitle">
                Traditional wisdom · Ayurvedic remedies · Yoga guidance
            </p>
        </header>

        <div class="card">
            <label for="symptom">What are you experiencing?</label>
            <textarea
                id="symptom"
                placeholder="e.g. headache, upset stomach, cold, fatigue…"
            ></textarea>

            <div class="chips" id="chips">
                <button class="chip" onclick="fillChip('headache')">
                    Headache
                </button>
                <button class="chip" onclick="fillChip('cold and cough')">
                    Cold & Cough
                </button>
                <button class="chip" onclick="fillChip('upset stomach')">
                    Upset Stomach
                </button>
                <button class="chip" onclick="fillChip('fatigue')">
                    Fatigue
                </button>
                <button class="chip" onclick="fillChip('acidity')">
                    Acidity
                </button>
                <button class="chip" onclick="fillChip('insomnia')">
                    Insomnia
                </button>
            </div>

            <button class="submit" id="submitBtn" onclick="askRemedies()">
                <span class="spinner"></span>
                <span class="btn-text">✦ Suggest Remedy</span>
            </button>
        </div>

        <div class="response-card" id="responseCard">
            <div class="response-header">
                <div class="dot"></div>
                Remedy Suggestion
            </div>
            <div class="response-body" id="responseBody"></div>
            <div class="disclaimer" id="disclaimerBox"></div>
        </div>

        <div class="error-card" id="errorCard"></div>

        <footer>
            Powered by TinyLlama · Fine-tuned on home remedies &amp; yoga
        </footer>

        <script>
            const textarea = document.getElementById("symptom");
            const submitBtn = document.getElementById("submitBtn");
            const responseCard = document.getElementById("responseCard");
            const responseBody = document.getElementById("responseBody");
            const disclaimerBox = document.getElementById("disclaimerBox");
            const errorCard = document.getElementById("errorCard");

            function fillChip(text) {
                textarea.value = text;
                textarea.focus();
            }

            textarea.addEventListener("keydown", (e) => {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    askRemedies();
                }
            });

            async function askRemedies() {
                const symptom = textarea.value.trim();
                if (!symptom) {
                    textarea.focus();
                    return;
                }

                // Reset UI
                responseCard.classList.remove("visible");
                errorCard.classList.remove("visible");
                submitBtn.classList.add("loading");
                submitBtn.disabled = true;

                try {
                    const res = await fetch("/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ symptom }),
                    });

                    if (!res.ok) throw new Error(`Server error: ${res.status}`);

                    const data = await res.json();
                    const full = data.response || "";

                    // Split disclaimer from main response
                    const DISCLAIMER_MARKER = "⚠️";
                    const dIdx = full.indexOf(DISCLAIMER_MARKER);
                    const mainText =
                        dIdx > -1 ? full.slice(0, dIdx).trim() : full.trim();
                    const disclaimerText =
                        dIdx > -1 ? full.slice(dIdx).trim() : "";

                    responseBody.textContent = mainText;
                    disclaimerBox.textContent = disclaimerText;
                    disclaimerBox.style.display = disclaimerText
                        ? "block"
                        : "none";
                    responseCard.classList.add("visible");
                } catch (err) {
                    errorCard.textContent = `⚠️ ${err.message || "Something went wrong. Please try again."}`;
                    errorCard.classList.add("visible");
                } finally {
                    submitBtn.classList.remove("loading");
                    submitBtn.disabled = false;
                }
            }
        </script>
    </body>
</html>
